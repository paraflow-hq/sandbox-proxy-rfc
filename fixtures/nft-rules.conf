# RFC transparent proxy nft rules.
#
# Uses `meta skuid` (nf_tables) instead of `iptables -m owner --uid-owner`
# because E2B kernel 6.1.158 has CONFIG_NETFILTER_XT_MATCH_OWNER disabled.
#
# Equivalent to Istio's `--uid-owner 1337 -j RETURN` but via nft.

flush ruleset

table ip proxy {
  chain output {
    type nat hook output priority -100; policy accept;

    # Core anti-loop: exempt mitmproxy user's ALL outbound traffic.
    # Prevents proxy self-loop regardless of code path or port.
    # Validated: counter shows correct packet matching in E2B sandbox.
    meta skuid "mitmproxy" counter accept

    # Exempt loopback (proxy health checks, activate-mitm, etc.)
    ip daddr 127.0.0.0/8 counter accept

    # Exempt private/reserved ranges
    ip daddr 0.0.0.0/8 accept
    ip daddr 10.0.0.0/8 accept
    ip daddr 172.16.0.0/12 accept
    ip daddr 192.168.0.0/16 accept
    ip daddr 169.254.0.0/16 accept
    ip daddr 192.0.2.0/24 accept
    ip daddr 198.51.100.0/24 accept
    ip daddr 203.0.113.0/24 accept

    # Redirect HTTP/HTTPS to proxy
    tcp dport 80 counter redirect to :18080
    tcp dport 443 counter redirect to :18443
    tcp dport 8443 counter redirect to :18443
  }
}
